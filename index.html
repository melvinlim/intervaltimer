<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Interval Timer</title>
<style>
    body {
        -webkit-user-select: none;  /* Safari */
        -moz-user-select: none;     /* Firefox */
        -ms-user-select: none;      /* IE10+ and Edge */
        user-select: none;          /* Standard property */
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        text-align: center;
        padding: 20px;
    }
    h1 { margin-bottom: 10px; }
    .block {
        background: #222;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
    }
    input {
        width: 70px;
        padding: 6px;
        font-size: 16px;
        text-align: center;
        margin: 5px;
        border-radius: 6px;
        border: none;
    }
    button {
        padding: 10px 16px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 6px;
        background: #28a745;
        color: white;
    }
    button.small {
        padding: 6px 10px;
        font-size: 14px;
        background: #444;
    }
    button.pause { background: #ffc107; }
    button.reset { background: #dc3545; }
    #display {
        font-size: 80px;
        margin: 40px 0;
    }
    #phase {
        font-size: 32px;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div id="UISection">
<h1>Interval Timer</h1>

<div id="blocks"></div>

<button id="addBlock">Add Interval</button>
</div>

<div id="phase">Ready</div>
<div id="display">00:00</div>

<button id="startBtn">Start</button>
<!-- <button id="pauseBtn" class="pause">Pause</button> -->
<button id="resetBtn" class="reset">Reset</button>

<script>
let sequence = [];
let seqIndex = 0;
let timeLeft = 0;
let timer = null;

const section = document.getElementById("UISection");

function beep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.value = 800;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
	if ('vibrate' in navigator) {
	  //if supported, trigger 200ms vibration
	  navigator.vibrate(200);
	}
}

function updateDisplay() {
    const m = String(Math.floor(timeLeft / 60)).padStart(2, "0");
    const s = String(timeLeft % 60).padStart(2, "0");
    document.getElementById("display").textContent = `${m}:${s}`;
}

function startNext() {
    if (seqIndex >= sequence.length) {
        document.getElementById("phase").textContent = "Done!";
        beep();
		clearInterval(timer);
	    timer = null;
	    seqIndex = 0;
		section.style.display = "block";	//show UI section
        return;
    }

    const step = sequence[seqIndex];
    timeLeft = step.duration;
    document.getElementById("phase").textContent = `${step.label}`;
    //updateDisplay();
    beep();

    timer = setInterval(() => {
        if (timeLeft < 0) {
            clearInterval(timer);
            seqIndex++;
            startNext();
        } else {
	        updateDisplay();
    	    timeLeft--;
		}
    }, 1000);
}

function buildSequence() {
    sequence = [];
    const blocks = document.querySelectorAll(".block");

    blocks.forEach((block, i) => {
        const Running = parseFloat(block.querySelector(".Running").value);
        const Walking = parseFloat(block.querySelector(".Walking").value);
        const rounds = parseInt(block.querySelector(".rounds").value);

        for (let r = 1; r <= rounds; r++) {
            sequence.push({
                label: `Running (Interval ${i+1}, Round ${r}/${rounds})`,
                duration: Running*60
            });
            if (Walking > 0) {
                sequence.push({
                    label: `Walking (Interval ${i+1}, Round ${r}/${rounds})`,
                    duration: Walking*60
                });
            }
        }
    });
}

function addBlock(Running=4, Walking=1, rounds=5) {
    const div = document.createElement("div");
    div.className = "block";
    div.innerHTML = `
        <label>Running (min): <input class="Running" type="tel" inputmode="numeric" value="${Running}" onfocus="this.select();this.setSelectionRange(0,this.value.length);"></label><br>
        <label>Walking (min): <input class="Walking" type="tel" inputmode="numeric" value="${Walking}" onfocus="this.select();this.setSelectionRange(0,this.value.length);"></label><br>
        <label>Rounds: <input class="rounds" type="tel" inputmode="numeric" value="${rounds}" onfocus="this.select();this.setSelectionRange(0,this.value.length);"></label><br>
        <button class="small remove">Delete</button>
    `;
    div.querySelector(".remove").onclick = () => div.remove();
    document.getElementById("blocks").appendChild(div);
}

document.getElementById("addBlock").onclick = () => addBlock();

document.getElementById("startBtn").onclick = () => {
    if (timer) return;
	section.style.display = "none";	//hide UI section
    buildSequence();
    seqIndex = 0;
    startNext();
};
/*
document.getElementById("pauseBtn").onclick = () => {
    if (timer) {
        clearInterval(timer);
        timer = null;
    }
};
*/
document.getElementById("resetBtn").onclick = () => {
    clearInterval(timer);
    timer = null;
	section.style.display = "block";	//show UI section
    seqIndex = 0;
    document.getElementById("phase").textContent = "Ready";
    document.getElementById("display").textContent = "00:00";
};

// Add one default block on load
addBlock();
</script>

</body>

</html>
